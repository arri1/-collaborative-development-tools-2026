<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diszoom</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app" class="app">
      <aside class="sidebar">
        <div class="logo">DISZOOM</div>
        <div class="search-row">
          <input id="serverSearch" type="text" placeholder="Search..." />
          <button id="joinServerBtn" class="icon">+</button>
        </div>
        <div id="serverList" class="server-list"></div>
        <button id="createServerBtn" class="primary">Create Server</button>
      </aside>

      <section class="main">
        <header class="topbar">
          <div class="top-left">
            <div id="serverTitle" class="server-title">Welcome</div>
          </div>
          <div class="top-right">
            <button id="openSettingsBtn" class="ghost">Settings</button>
            <div id="userBadge" class="user-badge"></div>
          </div>
        </header>

        <div class="content">
          <aside id="channelsPanel" class="channels hidden">
            <div class="channels-head">
              <span>Channels</span>
              <button id="addChannelBtn" class="icon">+</button>
            </div>
            <div class="channel-group">
              <div class="channel-group-title">Text</div>
              <div id="textChannels" class="channel-list"></div>
            </div>
            <div class="channel-group">
              <div class="channel-group-title">Media</div>
              <div id="mediaChannels" class="channel-list"></div>
            </div>
            <div class="channels-actions">
              <button id="rolesBtn" class="ghost">Roles</button>
              <button id="inviteBtn" class="ghost">Invite</button>
            </div>
          </aside>

          <main class="panel">
            <div id="panelContent" class="panel-content"></div>
          </main>
          <aside id="membersPanel" class="members hidden">
            <div class="members-head">Members</div>
            <div id="membersPanelList" class="member-list"></div>
            <button id="deleteServerBtn" class="danger hidden">Delete Server</button>
          </aside>
        </div>
      </section>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="modal-overlay hidden"></div>

    <div id="authModal" class="modal hidden">
      <h2>Welcome</h2>
      <div class="tabs">
        <button id="tabLogin" class="tab active">Login</button>
        <button id="tabRegister" class="tab">Register</button>
      </div>
      <div id="loginForm" class="form">
        <input id="loginUser" type="text" placeholder="Username" />
        <input id="loginPass" type="password" placeholder="Password" />
        <button id="loginBtn" class="primary">Login</button>
      </div>
      <div id="registerForm" class="form hidden">
        <input id="registerUser" type="text" placeholder="Username" />
        <input id="registerPass" type="password" placeholder="Password" />
        <button id="registerBtn" class="primary">Register</button>
      </div>
    </div>

    <div id="createServerModal" class="modal hidden">
      <h2>Create Server</h2>
      <input id="serverNameInput" type="text" placeholder="Server name" />
      <button id="createServerConfirm" class="primary">Create</button>
    </div>

    <div id="joinServerModal" class="modal hidden">
      <h2>Join Server</h2>
      <input id="inviteCodeInput" type="text" placeholder="Invite code" />
      <button id="joinServerConfirm" class="primary">Join</button>
    </div>

    <div id="addChannelModal" class="modal hidden">
      <h2>Add Channel</h2>
      <input id="channelNameInput" type="text" placeholder="Channel name" />
      <select id="channelTypeSelect">
        <option value="text">Text</option>
        <option value="media">Media</option>
      </select>
      <button id="addChannelConfirm" class="primary">Add</button>
    </div>

    <div id="rolesModal" class="modal hidden">
      <h2>Roles</h2>
      <div id="rolesList" class="list"></div>
      <div class="form">
        <input id="roleNameInput" type="text" placeholder="Role name" />
        <label class="inline"><input id="permManageRoles" type="checkbox" /> Manage Roles</label>
        <label class="inline"><input id="permManageChannels" type="checkbox" /> Manage Channels</label>
        <label class="inline"><input id="permCreateInvites" type="checkbox" /> Create Invites</label>
        <button id="createRoleConfirm" class="primary">Create Role</button>
      </div>
      <h3>Members</h3>
      <div id="membersList" class="list"></div>
    </div>

    <div id="inviteModal" class="modal hidden">
      <h2>Invite Link</h2>
      <div id="inviteInfo" class="invite-info"></div>
      <button id="createInviteConfirm" class="primary">Generate Invite</button>
    </div>

    <div id="settingsModal" class="modal hidden">
      <h2>Settings</h2>
      <label>Microphone</label>
      <select id="audioDeviceSelect"></select>
      <label>Camera</label>
      <select id="videoDeviceSelect"></select>
      <button id="saveSettingsBtn" class="primary">Save</button>
      <button id="logoutBtn" class="ghost">Logout</button>
    </div>

    <div id="memberMenu" class="member-menu hidden">
      <div class="menu-title">User volume</div>
      <input id="memberVolumeRange" type="range" min="0" max="100" value="100" />
      <div id="memberVolumeValue">100%</div>
    </div>

    <script type="module" src="/app.bundle.js"></script>
  </body>
</html>
